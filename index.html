<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アラームアプリ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>⏰ アラーム</h1>

    <div class="clock" id="clock">00:00:00</div>

    <div class="alarm-set">
      <label for="alarm-time">アラーム時刻</label>
      <input type="time" id="alarm-time" />
      <button id="set-btn">セット</button>
    </div>

    <div class="alarm-list" id="alarm-list"></div>

    <div class="ringing hidden" id="ringing">
      <p>🔔 アラーム！</p>
      <button id="stop-btn">止める</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
