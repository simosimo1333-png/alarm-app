<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>カートレース</title>
  <link rel="stylesheet" href="racing.css" />
</head>
<body>
  <div class="race-container">
    <h1>🏁 カートレース</h1>

    <div class="game-area" id="game-area">
      <canvas id="sky" width="750" height="450"></canvas>
      <canvas id="game3d" width="750" height="450"></canvas>
      <canvas id="game" width="750" height="450"></canvas>
      <canvas id="minimap" width="180" height="180"></canvas>

      <div id="hud" class="hidden">
        <div class="hud-laptime">
          <div id="hud-lap">LAP <b>1</b><span>/3</span></div>
          <div id="hud-time"><span class="sw">⏱</span><span id="hud-time-v">0'00"00</span></div>
        </div>
        <ol id="hud-standings"></ol>
        <div id="hud-pos"><span class="num">4</span><span class="ord">th</span></div>
        <div id="hud-item" title="アイテム"></div>
        <canvas id="speedo" width="220" height="220"></canvas>
      </div>

      <div id="message"></div>
      <div id="wrongway" class="hidden">⚠️ 逆走中！</div>

      <div id="panel">
        <h2>🏎️ カートレース</h2>
        <div id="course-select"></div>
        <p class="panel-text" id="panel-text"></p>
        <div id="name-row">
          <label for="player-name">なまえ</label>
          <input id="player-name" maxlength="8" placeholder="あなた" />
        </div>
        <button id="start-btn">スタート！</button>
        <button id="gp-btn">🏆 グランプリ（全5コース）</button>
        <div id="vs-area">
          <button id="vs-btn">🌐 ふたりで対戦</button>
          <div id="vs-menu" class="hidden">
            <button class="vs-mini" id="vs-host">ルームを作る</button>
            <span class="vs-or">or</span>
            <input id="vs-code" inputmode="numeric" maxlength="4" placeholder="コード" />
            <button class="vs-mini" id="vs-join">参加する</button>
            <div id="vs-status"></div>
          </div>
        </div>
        <div id="results" class="hidden"></div>
      </div>
    </div>

    <div id="touch-controls">
      <div id="steer-bar">
        <span>◀</span><span>▶</span>
        <div id="steer-knob"></div>
      </div>
      <button class="tc-btn tc-small" id="tc-fs">⛶</button>
      <div class="tc-group">
        <button class="tc-btn" id="tc-item">🎁</button>
        <button class="tc-btn tc-back" id="tc-back">バック</button>
        <button class="tc-btn tc-gas" id="tc-gas">GO</button>
      </div>
    </div>

    <p class="controls-help">
      操作: ↑/W = アクセル ・ ↓/S = ブレーキ／バック ・ ←→/A D = ハンドル ・ スペース = アイテム（↓を押しながらで後ろに投げる） ・ R = コース復帰
    </p>
  </div>

  <script src="racing3d.js"></script>
  <script src="racing.js"></script>
</body>
</html>
